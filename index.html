<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Memory Card Game</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= START SCREEN ================= -->

    <div id="startScreen">

        <div class="start-box">

            <h1>🧠 Memory Card Game</h1>

            <p>Match all cards with minimum moves.</p>

            <div class="mb-4">

                <label class="form-label text-white">
                    Select Difficulty
                </label>

                <select id="difficulty" class="form-select">

                    <option value="easy">
                        Easy (4 Pairs)
                    </option>

                    <option value="medium">
                        Medium (6 Pairs)
                    </option>

                    <option value="hard">
                        Hard (8 Pairs)
                    </option>

                </select>

            </div>

            <button id="startGameBtn" class="btn btn-success btn-lg w-100">

                ▶ Start Game

            </button>

        </div>

    </div>

    <!-- ================= GAME ================= -->

    <div class="container py-4">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="game-header">

                    <h1 class="text-center mb-4">

                        🧠 Memory Card Game

                    </h1>

                    <div class="row g-3">

                        <div class="col-4">

                            <div class="info-box">

                                <small>Moves</small>

                                <h3 id="moves">0</h3>

                            </div>

                        </div>

                        <div class="col-4">

                            <div class="info-box">

                                <small>Time</small>

                                <h3 id="timer">00:00</h3>

                            </div>

                        </div>

                        <div class="col-4">

                            <div class="info-box">

                                <small>Best</small>

                                <h3 id="bestScore">--</h3>

                            </div>

                        </div>

                    </div>

                    <div class="text-center mt-4">

                        <button class="btn btn-secondary px-4 me-2" id="backBtn">
                            <i class="fa-solid fa-arrow-left"></i>
                            Back
                        </button>

                        <button class="btn btn-success px-4" id="restartBtn">

                            <i class="fa-solid fa-rotate-right"></i>

                            Restart

                        </button>

                    </div>

                </div>

                <!-- Game Board -->

                <div id="gameBoard" class="game-board">

                </div>

            </div>

        </div>

    </div>

    <!-- ================= WIN MODAL ================= -->

    <div class="modal fade" id="winModal" tabindex="-1">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content bg-dark text-white rounded-4">

                <div class="modal-header border-0">

                    <h3 class="modal-title w-100 text-center">

                        🎉 Congratulations

                    </h3>

                </div>

                <div class="modal-body text-center">

                    <h5>You Won the Game!</h5>

                    <hr>

                    <p>

                        <strong>Difficulty :</strong>

                        <span id="finalDifficulty"></span>

                    </p>

                    <p>

                        <strong>Moves :</strong>

                        <span id="finalMoves"></span>

                    </p>

                    <p>

                        <strong>Time :</strong>

                        <span id="finalTime"></span>

                    </p>

                    <p>

                        <strong>Best Score :</strong>

                        <span id="finalBest"></span>

                    </p>

                    <div class="mt-3">

                        <h5>Your Rating</h5>

                        <div id="starRating" class="fs-1 text-warning">

                            ⭐⭐⭐

                        </div>

                    </div>

                </div>

                <div class="modal-footer border-0 justify-content-center">

                    <button class="btn btn-success px-4" id="playAgain">

                        ▶ Play Again

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- jQuery -->

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Confetti -->

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <!-- Script -->

    <script src="script.js"></script>

</body>

</html>
